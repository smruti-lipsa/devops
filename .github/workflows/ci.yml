name: imple CI pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Run a simple command 
      run: echo "This is my pipeline run"

    - name: Step 1
      run: echo "This is my first step"

    - name: Step 2
      run: echo "This is my second step"

    - name: Login to GHCR
      run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Build Docker Image
      run: docker build -t ghcr.io/${{ github.actor }}/devops:v1 .

    - name: Push Docker Image
      run: docker push ghcr.io/${{ github.actor }}/devops:v1